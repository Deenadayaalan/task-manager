<div class="topbar">
    <div class="topbar-title">{{$ctrl.isEdit ? 'Edit Task' : 'Create Task'}}</div>
</div>
<div class="page-content">
    <div class="alert alert-error" ng-if="$ctrl.error">{{$ctrl.error}}</div>

    <div class="card">
        <form ng-submit="$ctrl.saveTask()" novalidate role="form" aria-label="Task form">
            <div class="form-group">
                <label for="title">Summary *</label>
                <input id="title" type="text" class="form-control" ng-model="$ctrl.task.title" required placeholder="What needs to be done?" />
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" class="form-control" ng-model="$ctrl.task.description" placeholder="Add a description..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" class="form-control" ng-model="$ctrl.task.status">
                        <option value="TODO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" class="form-control" ng-model="$ctrl.task.priority">
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="assignee">Assignee</label>
                    <input id="assignee" type="text" class="form-control" ng-model="$ctrl.task.assignee" placeholder="Assign to..." />
                </div>
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input id="dueDate" type="date" class="form-control" ng-model="$ctrl.task.dueDate" />
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{$ctrl.isEdit ? 'Save Changes' : 'Create Task'}}</button>
                <a href="#!/tasks" class="btn btn-subtle">Cancel</a>
            </div>
        </form>
    </div>
</div>
